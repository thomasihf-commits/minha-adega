<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Adega Juliana</title>

<style>
:root{
  --vinho:#85002b;
  --vinho-escuro:#4d0018;
  --vinho-claro:#b20a42;
  --dourado:#d8b13f;
  --rose:#ef8c8c;
  --fundo:#fbf7f3;
  --card:#ffffff;
  --texto:#1e1718;
  --muted:#73676a;
  --borda:#eee1db;
  --sombra:0 10px 28px rgba(70,25,22,.10);
}

*{ box-sizing:border-box; }

  gap:26px;
  position:sticky;
