<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adega Thomas</title>

<style>
body{

    background:#f5f5f5;

.container{

    margin:auto;
}

h1{
    color:#7b1128;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;

    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    background:#7b1128;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.total{
    font-size:24px;
    font-weight:bold;
    color:#7b1128;
}

.vinho{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}
</style>
</head>

</div>
